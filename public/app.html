<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lunsj-app</title>
    <style>
      :root {
        --bg-1: #fff8eb;
        --bg-2: #ffe4c7;
        --ink: #1d1202;
        --panel: #fffdf9;
        --stroke: #f0d7b7;
        --accent: #df4f20;
        --accent-2: #2f7f69;
        --muted: #6e5a45;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(1200px 500px at -10% -20%, #ffd9a6 0%, transparent 55%),
          radial-gradient(900px 480px at 105% 0%, #ffc89f 0%, transparent 50%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2));
      }
      .shell { max-width: 1000px; margin: 0 auto; padding: 2rem 1rem 3rem; }
      .hero { display: flex; gap: 1rem; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
      h1 { margin: 0; font-size: clamp(1.9rem, 3.4vw, 3rem); }
      h2 { margin-top: 0; }
      .subtitle { margin-top: 0.5rem; color: var(--muted); }
      .panel {
        background: var(--panel);
        border: 1px solid var(--stroke);
        border-radius: 16px;
        padding: 1rem 1.2rem;
        box-shadow: 0 12px 30px rgba(130, 84, 36, 0.1);
        margin-bottom: 1rem;
      }
      .row { display: flex; align-items: center; justify-content: space-between; gap: 0.6rem; flex-wrap: wrap; }
      .days { display: grid; gap: 0.7rem; }
      .day {
        display: grid;
        grid-template-columns: 130px 120px 1fr 90px;
        align-items: center;
        gap: 0.65rem;
        padding: 0.55rem 0.65rem;
        border-radius: 10px;
        border: 1px solid #f7e6d1;
        background: #fff;
      }
      .day:hover { background: #fff6ea; }
      .day .menu-pill {
        display: inline-block;
        padding: 0.3rem 0.6rem;
        border-radius: 999px;
        background: #fff1de;
        color: #6d4620;
        font-weight: 600;
      }
      .day .date { color: var(--muted); font-size: .9rem; }
      .day .presence { justify-self: end; font-weight: 600; }
      .day input[type="checkbox"] { width: 1rem; height: 1rem; accent-color: var(--accent-2); margin-right: .35rem; }
      .menu-grid { display: grid; gap: 0.7rem; }
      .menu-row {
        display: grid;
        grid-template-columns: 95px 1fr 120px;
        align-items: center;
        gap: .6rem;
      }
      .menu-row input[type="text"] {
        width: 100%;
        border: 1px solid var(--stroke);
        border-radius: 8px;
        padding: 0.45rem 0.55rem;
        background: #fff;
      }
      .menu-row .date { color: var(--muted); font-size: .9rem; }
      button, select {
        border: 0;
        border-radius: 10px;
        padding: 0.65rem 1rem;
        font-weight: 700;
      }
      select { border: 1px solid var(--stroke); background: #fff; }
      button { cursor: pointer; }
      .primary { background: var(--accent); color: #fff; }
      .ghost { background: #f9efe2; color: #6e5031; }
      .admin { display: none; }
      .admin.show { display: block; }
      .ok { color: #146b46; }
      .err { color: #a21919; }
      .today {
        display: inline-block;
        padding: 0.35rem 0.6rem;
        border-radius: 8px;
        background: #fff1de;
        color: #6b4a24;
        font-weight: 700;
      }
      @media (max-width: 840px) {
        .day {
          grid-template-columns: 1fr;
          gap: .35rem;
        }
        .day .presence { justify-self: start; }
        .menu-row { grid-template-columns: 1fr; }
      }
      @media (max-width: 640px) {
        .shell { padding-top: 1.2rem; }
        .hero { flex-direction: column; }
        button { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <h1>Lunsjplan</h1>
          <p class="subtitle">Hver rad viser dag, dato, dagens rett og om du er pa jobb.</p>
        </div>
        <button id="logoutBtn" class="ghost">Logg ut</button>
      </section>

      <section class="panel">
        <div class="row">
          <strong id="user">Innlogget:</strong>
          <label>Uke:
            <select id="weekSelect">
              <option value="current">Denne uken</option>
              <option value="next">Neste uke</option>
            </select>
          </label>
        </div>
        <div class="row" style="margin-top:0.5rem;">
          <span id="week">Uke starter:</span>
          <span id="todayDish" class="today">Dagens rett: -</span>
        </div>
      </section>

      <section class="panel">
        <h2>Dager denne uka</h2>
        <div id="days" class="days"></div>
        <div style="margin-top: 1rem;">
          <button id="saveBtn" class="primary">Lagre ukevalg</button>
        </div>
        <p id="status"></p>
      </section>

      <section id="adminPanel" class="panel admin">
        <h2>Administrator</h2>
        <p class="subtitle" style="margin-top:0">Rediger meny for valgt uke og last ned rapport.</p>
        <div id="menuEditor" class="menu-grid"></div>
        <div class="row" style="margin-top:0.9rem;">
          <button id="saveMenuBtn" class="ghost">Lagre meny</button>
          <button id="downloadReportBtn" class="ghost">Last ned Excel-rapport</button>
        </div>
        <p id="adminStatus"></p>
      </section>
    </main>

    <script>
      let model = null;

      async function fetchJson(url, options = {}) {
        const res = await fetch(url, options);
        if (!res.ok) throw new Error(await res.text());
        return res.json();
      }

      function setStatus(id, message, cls = "") {
        const el = document.getElementById(id);
        el.textContent = message;
        el.className = cls;
      }

      function currentWeekSelection() {
        return document.getElementById("weekSelect").value;
      }

      function renderMenuEditor() {
        const menuEditor = document.getElementById("menuEditor");
        menuEditor.innerHTML = "";

        model.weekdays.forEach((d) => {
          const row = document.createElement("label");
          row.className = "menu-row";
          row.innerHTML = `
            <strong>${d.label}</strong>
            <input type="text" data-menu-key="${d.key}" value="${(model.menu[d.key] || "").replace(/"/g, "&quot;")}" placeholder="Dagens rett" />
            <span class="date">${d.key}</span>
          `;
          menuEditor.appendChild(row);
        });
      }

      function renderDays() {
        const daysDiv = document.getElementById("days");
        daysDiv.innerHTML = "";

        model.weekdays.forEach((d) => {
          const wrap = document.createElement("label");
          wrap.className = "day";
          const checked = model.days[d.key] ? "checked" : "";
          wrap.innerHTML = `
            <strong>${d.label}</strong>
            <span class="date">${d.key}</span>
            <span class="menu-pill">${model.menu[d.key] || "Meny kommer"}</span>
            <span class="presence"><input type="checkbox" data-key="${d.key}" ${checked} />Pa jobb</span>
          `;
          daysDiv.appendChild(wrap);
        });
      }

      function render() {
        document.getElementById("user").textContent = `Innlogget: ${model.user.email}`;
        document.getElementById("week").textContent = `Uke starter: ${model.weekStart}`;
        document.getElementById("todayDish").textContent = `Dagens rett: ${model.todayDish || "ikke satt"}`;
        document.getElementById("weekSelect").value = model.week;

        renderDays();

        const adminPanel = document.getElementById("adminPanel");
        adminPanel.classList.toggle("show", Boolean(model.isAdmin));
        if (model.isAdmin) {
          renderMenuEditor();
        }
      }

      async function loadWeek(week) {
        const me = await fetchJson("/api/me");
        if (!me.user) {
          window.location.href = "/login.html";
          return;
        }

        const weekData = await fetchJson(`/api/week?week=${encodeURIComponent(week)}`);
        model = { ...weekData, user: me.user, isAdmin: me.isAdmin };
        render();
      }

      document.getElementById("weekSelect").addEventListener("change", async (e) => {
        await loadWeek(e.target.value);
      });

      document.getElementById("saveBtn").addEventListener("click", async () => {
        const checks = document.querySelectorAll("#days input[type=checkbox]");
        const days = {};
        checks.forEach((c) => { days[c.dataset.key] = c.checked; });

        setStatus("status", "Lagrer...");
        try {
          await fetchJson(`/api/week?week=${encodeURIComponent(currentWeekSelection())}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ days })
          });
          setStatus("status", "Lagret.", "ok");
        } catch (e) {
          setStatus("status", `Feil: ${e.message}`, "err");
        }
      });

      document.getElementById("saveMenuBtn").addEventListener("click", async () => {
        const inputs = document.querySelectorAll("#menuEditor input[data-menu-key]");
        const menu = {};
        inputs.forEach((i) => { menu[i.dataset.menuKey] = i.value; });

        setStatus("adminStatus", "Lagrer meny...");
        try {
          await fetchJson(`/api/admin/menu?week=${encodeURIComponent(currentWeekSelection())}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ menu })
          });
          await loadWeek(currentWeekSelection());
          setStatus("adminStatus", "Meny lagret.", "ok");
        } catch (e) {
          setStatus("adminStatus", `Feil: ${e.message}`, "err");
        }
      });

      document.getElementById("downloadReportBtn").addEventListener("click", async () => {
        setStatus("adminStatus", "Lager rapport...");
        try {
          const res = await fetch(`/api/admin/report/download?week=${encodeURIComponent(currentWeekSelection())}`);
          if (!res.ok) {
            throw new Error(await res.text());
          }

          const blob = await res.blob();
          const disposition = res.headers.get("content-disposition") || "";
          const match = disposition.match(/filename="?([^";]+)"?/i);
          const filename = match ? match[1] : "lunsjrapport.xlsx";

          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);

          setStatus("adminStatus", "Rapport lastet ned.", "ok");
        } catch (e) {
          setStatus("adminStatus", `Feil: ${e.message}`, "err");
        }
      });

      document.getElementById("logoutBtn").addEventListener("click", async () => {
        await fetchJson("/auth/logout", { method: "POST" });
        window.location.href = "/login.html";
      });

      loadWeek("current").catch((e) => {
        setStatus("status", `Feil under init: ${e.message}`, "err");
      });
    </script>
  </body>
</html>
